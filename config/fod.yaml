---
# FOD (Foreign Object Detection) — 공구 분실 감지 운영 파라미터
#
# 참조: .claude/rules/safety.md S-8, docs/decisions.md ADR / 결정 #8

schema:
  version: 2
  required: [checkout_timeout_minutes, missing_to_alert_seconds, staging_vision_timeout_s]
  optional: []

# ── staged → missing: 비전 기반 (S-8) ──────────────────────────────────────
# /vision/detections/top_view 에서 staged 공구가 이 시간(초) 연속 미감지되면 missing 전환.
# 로봇팔 일시 가림·YOLO 오탐 방지를 위해 60초로 설정.
staging_vision_timeout_s: 60

# ── out → missing: 타임아웃 기반 (S-8) ──────────────────────────────────────
# operator가 공구를 손에 들고 있는 동안은 탑뷰 감지 불가 → 타임아웃으로만 판단.
checkout_timeout_minutes: 10

# ── missing → fod_alert: 30분 유예 (S-8) ──────────────────────────────────
# 정비 목적 반출(정상 케이스)과 실제 분실을 구분하기 위해 30분(1800초) 유예.
missing_to_alert_seconds: 1800

# 부팅 시 reconciliation (S-9)
boot_reconciliation:
  enabled: true
  scan_pose: scan_toolbox              # robot_poses.yaml 키
  detection_confidence_threshold: 0.85  # YOLOv11s confidence

# 운영자 알림 정책 (결정 #28: v1.0은 PLC LED만 사용)
alert:
  plc_color: yellow
  plc_mode: flash                      # PLC LED enum: solid | pulse | flash
  require_operator_ack: true           # ack 전까지 새 fetch 거부

# 미해결: missing → fod_alert 후 자동 복구 정책
# 운영자가 공구를 슬롯에 다시 넣으면 자동으로 in_slot 복구할지,
# 운영자 명시적 ack를 요구할지 → Phase 5a 결정 필요
