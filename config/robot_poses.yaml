---
# 사전 정의 로봇 포즈
#
# 단위: joint 각도는 rad (E-1), Cartesian은 m + quaternion
# 좌표계: robot_base_link (REP-103)
# 로봇: Doosan e0509 (6-DOF) — joint 순서 [j1, j2, j3, j4, j5, j6]
# 참조: docs/hardware.md, .claude/rules/engineering.md E-1

schema:
  version: 1
  joint_count: 6
  joint_order: ["j1", "j2", "j3", "j4", "j5", "j6"]
  joint_unit: rad

# ⚠️ Phase 0 ② 실기 측정 후 확정. 아래는 e0509 일반적인 시작점 예시.

poses:
  # 홈 포즈 — 명령 대기 상태, 운영자 시야 방해 안 함, 카메라가 공구함 향함
  home:
    # deg: [0, -30, 90, 0, 90, 0]
    joints: [0.0, -0.524, 1.571, 0.0, 1.571, 0.0]
    description: "대기 자세. 동작 종료 후 자동 복귀 (결정 #13, S-7)."

  # 층별 탑뷰 시야 확보 포즈 — 부팅 reconciliation 시 각 서랍 개방 후 arm을 D455f 시야 밖으로 이동
  # 탑뷰 카메라(D455f)는 고정 마운트로 상시 스트리밍 중 — 별도 카메라 포즈 불필요.
  # arm을 비켜주면 탑뷰 스트림으로 슬롯 스캔 가능.
  # 흐름: 서랍 열기 → scan_layer_N(arm 퇴피) → D455f 기존 스트림으로 슬롯 스캔 → DB 기록 → 서랍 닫기
  # ⚠️ 아래 joints는 임의값. 실기에서 탑뷰 시야가 확보되는 arm 퇴피 자세로 교체 필요.
  scan_layer_0:
    # deg: [0, -20, 70, 0, 80, 0]
    joints: [0.0, -0.349, 1.222, 0.0, 1.396, 0.0]
    description: "layer 0(아랫층/1층 서랍) 개방 후 탑뷰 D455f 시야 확보용 arm 퇴피 자세."

  scan_layer_1:
    # deg: [0, -15, 65, 0, 80, 0]
    joints: [0.0, -0.262, 1.134, 0.0, 1.396, 0.0]
    description: "layer 1(윗층/2층 서랍) 개방 후 탑뷰 D455f 시야 확보용 arm 퇴피 자세."

  # Staging Area 전체 스캔 포즈 — 무단 회수 감지 (결정 #26)
  scan_staging:
    # deg: [90, -20, 70, 0, 80, 0]
    joints: [1.571, -0.349, 1.222, 0.0, 1.396, 0.0]
    description: "Staging Area 전체가 시야에 들어오는 포즈. idle 시 주기적 확인."

  # 캘리브레이션 시작 포즈
  calibration_start:
    # deg: [0, -45, 90, 0, 45, 0]
    joints: [0.0, -0.785, 1.571, 0.0, 0.785, 0.0]
    description: "Hand-eye 캘리브레이션 첫 포즈. 이후 자동으로 다양한 자세 순회."

# ── 모션 속도·가속도 상한 (S-5/E-4) ─────────────────────────────────────
# toolbox_seq_runner --ros-args -p vel_l:=<value> 로 오버라이드 가능.
# 단위: DSR 네이티브 (mm/s, deg/s) — toolbox_motion.py와 동일 단위계.
# 참조: .claude/rules/safety.md S-5, .claude/rules/engineering.md E-4
motion_limits:
  vel_l_mm_s: 50.0      # Cartesian 선속도 상한 (S-5: 협동 모드 250mm/s 이하)
  acc_l_mm_s2: 200.0    # Cartesian 선가속도 상한
  vel_r_deg_s: 15.3     # Cartesian 회전 속도 상한
  acc_r_deg_s2: 61.2    # Cartesian 회전 가속도 상한
  vel_j_deg_s: 12.0     # 관절 속도 상한
  acc_j_deg_s2: 20.0    # 관절 가속도 상한

# ── TCP 설정 (E-4) ───────────────────────────────────────────────────────────
# 단위: DSR 네이티브 (mm, deg) — ConfigCreateTcp pos 배열 [x, y, z, rx, ry, rz]
tcp:
  name: GripperDA_v1
  offset_mm: [0.0, 0.0, 160.0, 0.0, 0.0, 0.0]   # flange → tool tip

# ── Tool (payload) 설정 (E-4) ─────────────────────────────────────────────────
# 단위: weight kg, cog mm (DSR 네이티브, flange 기준)
tool:
  name: GripperDA_v1
  weight_kg: 0.5
  cog_mm: [0.0, 0.0, 80.0]        # 그리퍼 무게중심 — flange 기준 Z 80mm (TCP 절반)
  inertia_kgm2: [0.00127, 0.00127, 0.0004, 0.0, 0.0, 0.0]
  # [Ixx, Iyy, Izz, Ixy, Ixz, Iyz] — RH-P12-RN 원통 근사 (r=40mm, h=160mm, m=0.5kg)
  # 실측 CAD 값 확보 시 교체 필요

# 안전 제약 (safety.md S-5):
# - 모든 포즈는 e0509 operational range 내
# - 소프트 리밋이 하드웨어 리밋보다 항상 좁아야 함
# - 새 포즈 추가 시 safety-reviewer 검토 필수
