---
# 운영 시 사용하는 비-시크릿 상수
# 환경별로 다른 값(IP·시리얼·토큰)은 .env, 시크릿도 .env 사용 (P-3)

hardware:
  # Doosan e0509 협동 로봇 (URDF/드라이버 선택용)
  robot_model: e0509

voice:
  # Whisper STT 모델 크기 — 결정 #21 (small, 결과 불량 시 medium 업그레이드)
  whisper_model_size: small

operator:
  # v1.0 고정값 — 결정 #20
  default_id: operator_01

db:
  # SQLite busy_timeout (ms) — db_service_node·fod_monitor_node가 같은 WAL
  # 파일에 동시 쓰기를 시도할 때 즉시 SQLITE_BUSY로 실패하지 않고 대기하는 시간.
  # 두 노드의 busy_timeout_ms 파라미터 기본값과 동일하게 유지한다.
  busy_timeout_ms: 5000

point_collect:
  # point_collect.py 카메라 좌표 수집 도구 파라미터
  image_width: 640
  image_height: 480
  depth_filter_size: 3   # median 필터 반경 → (2*size+1)² 영역

calibration:
  # hand-eye 캘리브레이션 모션 파라미터 (handeye_calib_motion.py)
  #
  # ⚠️ E-1 예외 사항: Doosan MoveJoint API(dsr_msgs2.srv.MoveJoint)는
  #   degree 입력을 요구하는 하드웨어 경계 인터페이스다.
  #   이 섹션의 vel/acc 단위는 deg/s, deg/s² — ROS2 내부 rad 표준과 다름.
  #   변경 시 safety-reviewer 검토 권장 (S-5 joint/속도 한계).
  motion_vel_deg_per_s: 20.0    # 캘리브레이션 이동 속도 (협동 모드 충분히 여유 있는 값)
  motion_acc_deg_per_s2: 10.0   # 캘리브레이션 가속도
  service_timeout_sec: 5.0      # move_joint 서비스 연결 대기 최대 시간

  # RANSAC 이상치 제거 파라미터 (compute_hand_eye.py)
  ransac_threshold_mm: 5.0      # inlier 판정 오차 기준 [mm]
  ransac_min_inliers: 6         # 유효 모델로 인정할 최소 inlier 수
  ransac_iterations: 200        # 반복 횟수

  # 오차 경고 임계값 (compute_hand_eye.py)
  error_warn_mm: 5.0            # 이 값 초과 시 재확인 권장
  error_ok_mm: 3.0              # 이 값 초과 시 추가 수집 권장

  # c270 카메라 장치 경로
  c270_device: /dev/video2
  c270_width: 640
  c270_height: 480

  # c270_handeye_collect.py — ChArUco 보드 파라미터 (실측값)
  charuco_squares_x: 5          # 가로 칸 수
  charuco_squares_y: 7          # 세로 칸 수
  charuco_square_size_m: 0.038  # 체커보드 칸 한 변 [m] — 실측 38mm
  charuco_marker_size_m: 0.0315  # ArUco 마커 한 변 [m] — 실측 31.5mm
  aruco_dict_id: 0              # cv2.aruco.DICT_4X4_50
  aruco_target_id: 0            # 캘리브레이션에 사용할 마커 ID
  min_sample_count: 15          # calibrateHandEye 권장 최소 샘플 수
  min_charuco_corners: 6        # 포즈 추정에 필요한 최소 ChArUco 코너 수

  # collect_handeye_data.py — TF 프레임 이름 (Doosan e0509 ROS2 드라이버 기준)
  base_frame: base_link
  gripper_frame: link_6
