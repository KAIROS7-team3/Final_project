---
# 공구함 슬롯 좌표 + 공구 기하 정보
#
# 부팅 시 YOLOv8 reconciliation (S-9), 슬롯 반납 동작에서 사용.
# 좌표계: robot_base_link (REP-103)
# 단위: meters, 각도 rad/quaternion — E-1 준수
# 참조: docs/architecture.md, docs/frames.md, .claude/rules/safety.md S-9

schema:
  version: 1
  toolbox:
    required: [origin, slot_size, grid_layers, grid_rows, grid_cols, orientation]
  tools:
    required: [tool_id, slot_layer, slot_row, slot_col, dimensions]
    optional: [display_name, mass_kg, grasp_approach, notes]

# 공구함 자체 위치/크기 (운영자가 공구함을 옮기면 이 값만 갱신)
toolbox:
  origin: {x: 0.300, y: -0.200, z: 0.050}  # 슬롯 (0,0)의 좌상단 모서리
  orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  slot_size: {x: 0.060, y: 0.060}  # 슬롯 한 칸의 가로/세로
  grid_layers: 2
  grid_rows: 1
  grid_cols: 3
  layer_height_z: 0.080  # 층간 높이. Phase 0 ② 실제 측정 후 갱신
  slot_depth_z: 0.040  # 공구가 슬롯에 들어간 깊이

# 6종 공구 카탈로그.
# 슬롯 기준은 robot_arm.db의 tools.home_slot_layer/home_slot_row/home_slot_col과 일치한다.
# ⚠️ 아래 좌표/치수/질량은 임의값이다. Phase 0 ② 캘리브레이션 + 실제 공구 측정 후 확정.
tools:
  - tool_id: screwdriver
    display_name: "십자 드라이버"
    slot_layer: 0
    slot_row: 0
    slot_col: 0
    dimensions: {length: 0.180, diameter: 0.020}  # m
    mass_kg: 0.080
    grasp_approach: top  # top | side | front
    notes: "임의값 — 실측 후 갱신"

  - tool_id: utility_knife
    display_name: "커터칼"
    slot_layer: 0
    slot_row: 0
    slot_col: 1
    dimensions: {length: 0.160, width: 0.030, height: 0.015}
    mass_kg: 0.070
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: ratchet_wrench
    display_name: "라쳇 렌치"
    slot_layer: 0
    slot_row: 0
    slot_col: 2
    dimensions: {length: 0.200, width: 0.040, height: 0.030}
    mass_kg: 0.250
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: multi_tool
    display_name: "멕가이버"
    slot_layer: 1
    slot_row: 0
    slot_col: 0
    dimensions: {length: 0.110, width: 0.035, height: 0.020}
    mass_kg: 0.180
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: spanner_16mm
    display_name: "스패너 16mm"
    slot_layer: 1
    slot_row: 0
    slot_col: 1
    dimensions: {length: 0.180, width: 0.040, height: 0.012}
    mass_kg: 0.120
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: socket_19mm
    display_name: "복스 소켓 19mm"
    slot_layer: 1
    slot_row: 0
    slot_col: 2
    dimensions: {length: 0.040, diameter: 0.026}
    mass_kg: 0.090
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

# 수락 기준 (docs/conventions.md):
# - 공구 분류 정확도 ≥ 95% (실험실 조명)
# - 슬롯 반납 오차 ≤ 5mm
