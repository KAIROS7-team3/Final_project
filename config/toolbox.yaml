---
# 공구함 물리 구조 + 공구 카탈로그
#
# 랜덤 배치 정책: 공구는 고정 슬롯 없이 층(layer) 안에 자유 배치.
# 실제 위치는 부팅·작업 전 스캔(reconciliation) 시 YOLO 검출로 결정되어 DB에 기록.
# toolbox.yaml은 물리 구조(크기·층수)와 공구 기하 정보만 관리.
#
# ── 공구 현황 추적 방식 ──────────────────────────────────────────────────
# D455f 스캔은 작업 세션당 2회만 수행한다.
#   [스캔 ①] 작업 시작 전: 서랍(layer 0 → layer 1) 순서로 개방 후 YOLOv11s 검출
#             → DB 초기 스냅샷 기록 (공구 존재 여부 + 대략적 위치)
#   [스캔 ②] 작업 종료 후: 동일 방식으로 재스캔 → DB 최종 상태 확인
#
# 스캔 사이(작업 중간) 공구 현황 변화는 스캔 없이 이벤트로 추적한다.
#   - fetch/return 작업 수행 시 발생하는 ROS 토픽·액션 결과를 DB에 반영
#   - (미구현) UI는 DB를 폴링하여 공구함 현황을 실시간 시각화
#
# robot_poses.yaml scan_layer_0 / scan_layer_1 참조
#
# 참조: docs/architecture.md, docs/frames.md, .claude/rules/safety.md S-9
# 단위: m + quaternion (REP-103, E-1)
# ─────────────────────────────────────────────────────────────────────────

schema:
  version: 4   # v3 → v4: 마커 2종(탑/프런트) 분리, 실측 치수 반영, 서랍 손잡이 오프셋 추가
  toolbox:
    required: [origin, dimensions, grid_layers, grid_rows, grid_cols, orientation]
  aruco:
    required: [top_marker, front_marker]
  drawers:
    required: [upper, lower]
  tools:
    required: [tool_id, dimensions]
    optional: [display_name, mass_kg, grasp_approach, notes]

# 공구함 자체 위치/크기 (운영자가 공구함을 옮기면 이 값만 갱신)
toolbox:
  origin: {x: 0.300, y: -0.200, z: 0.050}  # layer 0 기준 좌상단 모서리
  orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  dimensions:           # 실측값 (m)
    width:  0.460
    depth:  0.260
    height: 0.220
  slot_size: {x: 0.060, y: 0.060}  # 슬롯 격자 한 칸 (참조용 — 공구는 격자 무관하게 놓임)
  grid_layers: 2    # 서랍 수 (스캔 횟수와 일치)
  grid_rows: 1
  grid_cols: 3
  layer_height_z: 0.080   # 층간 높이 — Phase 0 ② 실제 측정 후 갱신
  slot_depth_z: 0.040

# ArUco 마커 — DICT_4X4_50, 탑뷰 ROI 계산 및 서랍 기준점 인식용
aruco:
  # 탑뷰 카메라(D455f)가 인식하는 공구함 윗면 마커
  top_marker:
    id: 2                   # DICT_4X4_50
    size_m: 0.050
    marker_to_origin:       # 마커 중심 → toolbox.origin 오프셋 (m)
      x: 0.0                # 실측 후 갱신
      y: 0.0                # 실측 후 갱신
      z: -0.120             # 윗면 → layer 0 바닥까지 높이 — 실측 후 갱신
  # 앞면 마커 — 서랍 층 기준점 계산용 (그리퍼 카메라 C270 가시 범위)
  front_marker:
    id: 0                   # DICT_4X4_50
    size_m: 0.050
    view_pose:
      standoff_m: 0.35      # 마커 정면 접근 거리

# 서랍 손잡이 오프셋 — front_marker 중심 기준 (m)
# z=0.015: 손잡이 돌출 22mm − 서랍 면판 오목 7mm = 15mm (마커 평면 기준)
drawers:
  upper:
    handle_offset: {y: 0.095, z: 0.015}
  lower:
    handle_offset: {y: 0.145, z: 0.015}

# 6종 공구 카탈로그 — 물리 치수·그립 정보만 관리.
# 슬롯 위치(slot_layer/row/col)는 스캔 시 DB에 기록되며 여기서 관리하지 않음.
# ⚠️ 치수·질량은 임의값. Phase 0 ② 실측 후 확정.
tools:
  - tool_id: screwdriver
    display_name: "십자 드라이버"
    dimensions: {length: 0.180, diameter: 0.020}
    mass_kg: 0.080
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: utility_knife
    display_name: "커터칼"
    dimensions: {length: 0.160, width: 0.030, height: 0.015}
    mass_kg: 0.070
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: ratchet_wrench
    display_name: "라쳇 렌치"
    dimensions: {length: 0.200, width: 0.040, height: 0.030}
    mass_kg: 0.250
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: multi_tool
    display_name: "멕가이버"
    dimensions: {length: 0.110, width: 0.035, height: 0.020}
    mass_kg: 0.180
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: spanner_16mm
    display_name: "스패너 16mm"
    dimensions: {length: 0.180, width: 0.040, height: 0.012}
    mass_kg: 0.120
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

  - tool_id: socket_19mm
    display_name: "복스 소켓 19mm"
    dimensions: {length: 0.040, diameter: 0.026}
    mass_kg: 0.090
    grasp_approach: top
    notes: "임의값 — 실측 후 갱신"

# 수락 기준 (docs/conventions.md):
# - 공구 분류 정확도 ≥ 95% (실험실 조명)
# - 스캔 후 DB 갱신까지 지연 ≤ 1s
