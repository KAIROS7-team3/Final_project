---
# 공구함 슬롯 좌표 + 공구 기하 정보
#
# 부팅 시 YOLOv8 reconciliation (S-9), 슬롯 반납 동작에서 사용.
# 좌표계: robot_base_link (REP-103)
# 단위: meters, 각도 rad/quaternion — E-1 준수
# 참조: docs/architecture.md, docs/frames.md, .claude/rules/safety.md S-9

schema:
  version: 1
  toolbox:
    required: [origin, slot_size, grid_rows, grid_cols, orientation]
  tools:
    required: [tool_id, slot_row, slot_col, dimensions]
    optional: [mass_kg, grasp_approach, notes]

# 공구함 자체 위치/크기 (운영자가 공구함을 옮기면 이 값만 갱신)
toolbox:
  origin: {x: 0.300, y: -0.200, z: 0.050}  # 슬롯 (0,0)의 좌상단 모서리
  orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  slot_size: {x: 0.060, y: 0.060}  # 슬롯 한 칸의 가로/세로
  grid_rows: 3
  grid_cols: 3
  slot_depth_z: 0.040  # 공구가 슬롯에 들어간 깊이

# 5종 공구 카탈로그 (수락 기준: 분류 정확도 ≥ 95%)
# ⚠️ 실제 공구 실측 후 dimensions / mass_kg 확정 필요 — 현재 추정값
tools:
  - tool_id: socket_19mm
    slot_row: 0
    slot_col: 0
    dimensions: {length: 0.050, diameter: 0.030}  # m, TBD 실측
    mass_kg: 0.070
    grasp_approach: top
    notes: "19mm 소켓"

  - tool_id: ratchet_handle
    slot_row: 0
    slot_col: 1
    dimensions: {length: 0.250, diameter: 0.022}  # m, TBD 실측
    mass_kg: 0.200
    grasp_approach: top
    notes: "래칫 핸들"

  - tool_id: hex_key_set_folding
    slot_row: 0
    slot_col: 2
    dimensions: {length: 0.090, width: 0.045, height: 0.015}  # m, 접힌 상태, TBD 실측
    mass_kg: 0.100
    grasp_approach: top
    notes: "접이식 육각렌치 세트"

  - tool_id: screwdriver_flat_6x100
    slot_row: 1
    slot_col: 0
    dimensions: {length: 0.220, diameter: 0.025}  # m, TBD 실측 (날 100mm + 손잡이)
    mass_kg: 0.080
    grasp_approach: top
    notes: "일자 드라이버 6x100mm"

  - tool_id: cutter_knife
    slot_row: 1
    slot_col: 1
    dimensions: {length: 0.150, width: 0.018, height: 0.012}  # m, 닫힌 상태, TBD 실측
    mass_kg: 0.060
    grasp_approach: top
    notes: "커터칼"

# 수락 기준 (docs/conventions.md):
# - 공구 분류 정확도 ≥ 95% (실험실 조명)
# - 슬롯 반납 오차 ≤ 5mm
