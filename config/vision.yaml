---
# Vision 파이프라인 설정 (Track A/B 전용)
#
# 참조: docs/architecture.md §4 vision/, .claude/rules/engineering.md E-4
# 좌표·임계값·모델 경로는 여기서만 관리 — 코드 하드코딩 금지

yolo:
  # ⚠️ Phase 2 YOLOv11s 파인튜닝 완료 후 모델 경로 기입
  # 탑뷰(D455f)와 그리퍼(C270)는 촬영 시점이 달라 별도 모델 학습 필요
  # 학습 완료 전: null → 노드 기동은 되나 추론 비활성화
  # v2: 단일객체+mix 801장, mAP50=0.973 — model_library의 active 버전
  top_view_model_path: ros2_ws/src/vision/model_library/top_view_model/v2/weights/best.pt
  gripper_model_path: null     # C270 그리퍼 시점 학습 모델 (runs/yolo/gripper_v1/weights/best.pt)
  confidence_threshold: 0.70   # 수락 기준: 공구 분류 정확도 ≥ 95% (docs/conventions.md)
  iou_threshold: 0.45
  device: "cuda"               # "cuda" | "cpu" (GPU 없을 시 cpu로 변경)
  input_size: 640              # YOLO 입력 해상도 (px)

  # 6종 공구 클래스 — 탑뷰/그리퍼 모델 공통 (학습 시 인덱스 순서와 반드시 일치)
  # datasets/tools/data.yaml의 names 순서와 동기화 유지
  # robot_arm.db tools 테이블 tool_id와 일치 필수
  # ⚠️ v2부터 알파벳순 (Roboflow 기준) — v1과 인덱스 다름, 혼용 금지
  class_names:
    - multi_tool     # 0  멕가이버
    - ratchet_wrench # 1  라쳇 렌치
    - screwdriver    # 2  십자 드라이버
    - socket_19mm    # 3  복스 소켓 19mm
    - spanner_16mm   # 4  스패너 16mm
    - utility_knife  # 5  커터칼

tracker:
  min_hits: 3          # 트랙 확정까지 필요한 연속 검출 프레임 수
  max_misses: 5        # 트랙 소멸까지 허용하는 연속 미검출 프레임 수
  max_match_dist_m: 0.05   # 동일 트랙으로 연결할 최대 거리 [m] (슬롯 간격 6cm 기준)
  ema_alpha: 0.3       # 위치 평활화 EMA 가중치 (0=고정, 1=즉시 반응)

debug:
  # /vision/debug/annotated 발행 여부 (운영 시 false 권장)
  publish_annotated_image: true
