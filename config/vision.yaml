---
# Vision 파이프라인 설정 (Track A/B 전용)
#
# 참조: docs/architecture.md §4 vision/, .claude/rules/engineering.md E-4
# 좌표·임계값·모델 경로는 여기서만 관리 — 코드 하드코딩 금지

yolo:
  # 탑뷰(D455f)와 그리퍼(C270)는 촬영 시점이 달라 별도 모델 학습 필요
  # 그리퍼 모델 학습 완료 전: null → 노드 기동은 되나 추론 비활성화
  # v3-seg: 세그멘테이션 모델 (YOLOv11n-seg), mAP50=0.977 — 현재 운용 버전
  # v3-2(detection): ros2_ws/src/vision/model_library/top_view_model/v3-2/weights/best.pt
  top_view_model_path: ros2_ws/src/vision/model_library/top_view_model/v3-seg/weights/best.pt
  gripper_model_path: ros2_ws/src/vision/model_library/gripper_model/v1/weights/best.pt
  confidence_threshold: 0.70   # 수락 기준: 공구 분류 정확도 ≥ 95% (docs/conventions.md)
  iou_threshold: 0.45
  device: "cuda"                # "cuda" | "cpu" (GPU 없을 시 cpu로 변경)
  input_size: 640              # YOLO 입력 해상도 (px)

  # 6종 공구 클래스 — 탑뷰/그리퍼 모델 공통 (학습 시 인덱스 순서와 반드시 일치)
  # datasets/tools/data.yaml의 names 순서와 동기화 유지
  # robot_arm.db tools 테이블 tool_id와 일치 필수
  # ⚠️ v2부터 알파벳순 (Roboflow 기준) — v1과 인덱스 다름, 혼용 금지
  class_names:
    - multi_tool       # 0  멕가이버
    - ratchet_wrench   # 1  라쳇 렌치
    - screwdriver      # 2  십자 드라이버
    - socket_19mm      # 3  복스 소켓 19mm (측면)
    - socket_19mm_top  # 4  복스 소켓 19mm (상면) — gripper_model v2 신규 (2026-06-17)
    - spanner_16mm     # 5  스패너 16mm
    - utility_knife    # 6  커터칼

tracker:
  min_hits: 3          # 트랙 확정까지 필요한 연속 검출 프레임 수
  max_misses: 5        # 트랙 소멸까지 허용하는 연속 미검출 프레임 수
  max_match_dist_m: 0.05   # 동일 트랙으로 연결할 최대 거리 [m] (슬롯 간격 6cm 기준)
  ema_alpha: 0.3       # 위치 평활화 EMA 가중치 (0=고정, 1=즉시 반응)

aruco:
  # ArUco 마커 스캔 설정 — MarkerScanNode 전용
  # scripts/multi_item/markers/ 에서 생성한 마커와 동일 딕셔너리 사용 필수
  dictionary: "DICT_4X4_50"

  # 실제 인쇄된 마커 한 변 길이 [m] — 오차 ±1mm 이내로 측정
  # 천장 마커: ID 2, 5×5cm / 전면 마커: ID 0, 5×5cm (toolbox.yaml aruco_front)
  # ↑ 전면 마커도 5cm. (구버전 주석 "4cm" 오기 — 2026-06-17 정정)
  marker_size_m: 0.05

  # 마커 중심 기준 공구 place 허용 반경 [mm]
  # 탑뷰 좌표 오차 + 작업자 여유 공간 고려 (기본 150mm)
  place_zone_radius_mm: 150.0

  # 마커 미감지 상태가 이 시간[s] 이상 지속되면 스캔 결과 초기화
  stale_timeout_sec: 2.0

  # debug 이미지 발행 여부 (/vision/marker/debug/image)
  publish_debug_image: true

debug:
  # /vision/debug/annotated 발행 여부 (운영 시 false 권장)
  publish_annotated_image: true

grasp_offset:
  # PCA 주축 방향으로 centroid에서 offset할 공구별 설정 (infer_c270_centroid.py)
  # ratio: 공구 전체 길이(픽셀) 대비 비율 / toward_narrow: true=손잡이 쪽, false=넓은 쪽
  screwdriver:
    ratio: 0.30
    toward_narrow: true
  ratchet_wrench:
    ratio: 0.10
    toward_narrow: false
  utility_knife:
    ratio: 0.20
    toward_narrow: true
