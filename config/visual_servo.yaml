---
# Visual Servoing 제어 파라미터 (Track B, Phase 1)
# 손잡이 XZ 정렬 전용 — TF 좌표 기반 (robot base frame, mm)
#
# 참조: unit_actions/visual_servoing.py, .claude/rules/engineering.md E-4

# ── P 제어 이득 ───────────────────────────────────────────────────────────────
# kp: mm 오차 → mm/s 속도 이득
gains:
  kp: 1.0

# ── 상태 전이 임계값 ─────────────────────────────────────────────────────────
thresholds:
  # XZ 정렬 완료 판정 거리 (mm) — 이 이내면 DONE
  xz_align_thr_mm: 3.0

# ── DETECT 안정화 조건 ────────────────────────────────────────────────────────
detect:
  # 연속 N프레임 이상 손잡이 좌표 수신 시 ALIGN_XZ 전환
  stable_frames: 3

# ── 속도 명령 상한 (S-5) ─────────────────────────────────────────────────────
# robot_poses.yaml motion_limits.vel_l_mm_s(50.0) 이하 유지
# VS 단계는 정밀 제어이므로 더 낮게 설정
vel_limit_mm_s: 20.0

# ── 전체 타임아웃 ────────────────────────────────────────────────────────────
# 루프 진입 시각 기준 단조증가 — 상태 전환 시 리셋 없음
timeout_sec: 15.0
