plc_node:
  ros__parameters:
    port: /dev/ttyUSB0
    baudrate: 115200
    parity: "N"
    stopbits: 1
    bytesize: 8
    device_id: 1

    # Start button coils. Arrays are index-aligned:
    # start_coil_labels[i] -> start_coil_addresses[i] -> start_coil_outputs[i].
    # XG5000 M labels are bit-device labels; M0010 maps to address 0x10, not 10.
    start_coil_labels: ["M0000", "M0001", "M0002", "M0003"]
    start_coil_addresses: [0, 1, 2, 3]
    start_coil_outputs: ["P0040", "P0041", "P0042", "P0043"]

    # Reset coil for the ladder common NC contact.
    reset_coil_label: "M0010"
    reset_coil_address: 16

    # Word register test points.
    read_register_label: "P020"
    read_register_address: 0
    write_register_label: "P000"
    write_register_address: 0

    # Safety/operation hooks.
    # 현재 image (4).png 래더에는 watchdog 전용 coil과 E-stop input이 없다.
    # 특히 M0100~M0103은 P0040~P0043 자기유지 bit라 watchdog으로 쓰면 안 된다.
    # 래더에 전용 device를 추가한 뒤 label/address를 채우고 enable_*를 true로 바꾼다.
    watchdog_coil_label: ""
    watchdog_coil_address: -1
    estop_input_label: ""
    estop_input_address: -1

    # Semantic state -> start coil mapping for higher-level packages.
    # output labels are comma-separated M labels; empty/none/- means reset only.
    # The node resets latched outputs via M0010 before pulsing the mapped coils.
    system_state_names: ["idle", "listening", "inferring", "moving", "error", "e_stop"]
    system_state_output_labels: ["M0000", "M0001", "M0001", "M0002", "M0003", "M0003"]

    read_period_s: 1.0
    connect_retry_count: 3
    connect_retry_backoff_s: 0.5
    pulse_duration_s: 0.2
    enable_watchdog: false
    watchdog_period_s: 0.5
    enable_estop_poll: false
    estop_poll_period_s: 0.1
