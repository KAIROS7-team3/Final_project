# =============================================================================
# top_view_model / v1 — 모델 정보
# =============================================================================
# 카메라: Intel RealSense D455f (탑뷰 고정 마운트)
# 역할: 공구함 전체를 위에서 내려다보며 어느 층·위치에 어떤 공구가 있는지 탐지
# 상태: 구버전 (참조용) — v2로 대체됨. active: false
# =============================================================================

version: v1
description: "탑뷰 D455f 기준 공구 6종 탐지 모델 (구버전, 참조용)"

# active: true이면 config/vision.yaml의 top_view_model_path가 이 버전을 가리켜야 함
# 현재는 v2가 운용 중이므로 false
active: false

# -----------------------------------------------------------------------------
# 모델 파일
# -----------------------------------------------------------------------------
model:
  # best.pt: 학습 중 val mAP가 가장 높았던 시점의 가중치
  # 파일은 gitignore 대상 — Google Drive에서 다운로드 후 weights/best.pt로 저장
  file: weights/best.pt
  base: yolo11s.pt    # 파인튜닝 시작점 (Ultralytics 공식 소형 모델)
  image_size: 640     # 학습·추론 시 입력 해상도 (픽셀)

# -----------------------------------------------------------------------------
# 학습에 사용한 데이터셋
# -----------------------------------------------------------------------------
dataset:
  name: top_view_v1
  size: 614           # 전체 이미지 수
  split: "train 430 / valid 123 / test 61"
  # Roboflow에서 라벨링·검수·export 진행
  source: Roboflow

# -----------------------------------------------------------------------------
# 학습 설정
# -----------------------------------------------------------------------------
training:
  epochs: 100
  trained_at: "2026-05-28"
  platform: Google Colab  # 런타임: T4 GPU

# -----------------------------------------------------------------------------
# 학습 결과
# -----------------------------------------------------------------------------
results:
  # mAP@0.5: IoU 0.5 기준 평균 정밀도 — 수락 기준 ≥ 0.85
  map50: 0.984
  # mAP@0.5:0.95: IoU 0.5~0.95 구간 평균 (v1에서는 미측정)
  map50_95: null
  # results/ 디렉토리: confusion matrix, PR curve 등 학습 결과 이미지·csv
  # gitignore 대상 — 코랩에서 다운로드 후 로컬에만 보관
  results_dir: results/

# Google Drive에 best.pt 업로드 후 공유 링크 기입
# 권한 설정: '링크 있는 모든 사용자 — 뷰어'
drive_url: ""  # TODO

# -----------------------------------------------------------------------------
# 클래스 인덱스 (v1 기준 — 임의 순서)
# ⚠️  v2와 순서가 다름. v1 best.pt로 추론한 결과를 v2 클래스 이름으로 해석하면 안 됨
# -----------------------------------------------------------------------------
classes:
  0: screwdriver
  1: utility_knife
  2: ratchet_wrench
  3: multi_tool
  4: spanner_16mm
  5: socket_19mm

# -----------------------------------------------------------------------------
# 알려진 문제점 (v2에서 개선됨)
# -----------------------------------------------------------------------------
known_issues:
  - "ratchet_wrench background 오인식 57% — 단일 객체 이미지만으로 학습해 실전 배경에 취약"
  - "클래스 순서가 v2와 다름 — 혼용 절대 금지"
