# =============================================================================
# top_view_model / v2 — 모델 정보
# =============================================================================
# 카메라: Intel RealSense D455f (탑뷰 고정 마운트)
# 역할: 공구함 전체를 위에서 내려다보며 어느 층·위치에 어떤 공구가 있는지 탐지
# 상태: 구버전 (active: false) — v3-2로 교체됨
#
# [v1 → v2 변경 요약]
#   - 데이터셋: 단일 객체 614장 → 단일+mix 혼합 801장
#     mix 이미지: 공구 여러 개를 랜덤 배치해 촬영한 200장 추가
#     → 실제 공구함처럼 여러 공구가 함께 찍히는 상황에 대한 일반화 능력 향상
#   - 클래스 순서: 임의 순서 → 알파벳순 통일 (Roboflow 기준)
#     ⚠️  v1과 인덱스가 다르므로 혼용 절대 금지
#   - 학습: 100 epoch → 200 epoch
#   - ratchet_wrench 오인식 문제 개선 (v1 background 오인식 57% → 대폭 감소)
# =============================================================================

version: v2
description: "탑뷰 D455f 기준 공구 6종 탐지 모델 (구버전 — v3-2로 교체됨)"

# active: true이면 config/vision.yaml의 top_view_model_path가 이 버전을 가리켜야 함
active: false

# -----------------------------------------------------------------------------
# 모델 파일
# -----------------------------------------------------------------------------
model:
  # best.pt: 학습 중 val mAP가 가장 높았던 시점의 가중치
  # 파일은 gitignore 대상 — Google Drive에서 다운로드 후 weights/best.pt로 저장
  file: weights/best.pt
  base: yolo11s.pt    # 파인튜닝 시작점 (Ultralytics 공식 소형 모델)
  image_size: 640     # 학습·추론 시 입력 해상도 (픽셀)

# -----------------------------------------------------------------------------
# 학습에 사용한 데이터셋
# -----------------------------------------------------------------------------
dataset:
  name: top_view_v2
  # v1(614장) + mix 200장 = 801장
  # mix: 공구 여러 개를 랜덤 배치해 촬영 — 실제 공구함 상황 반영
  size: 801
  split: "train 561 / valid 160 / test 80"
  # Roboflow에서 자동 라벨링(v1 best.pt) → 수동 검수 → export
  source: "Roboflow — workspace: yeonseop9999-gmail-com / project: final-project-kir4p / version: 1"

# -----------------------------------------------------------------------------
# 학습 설정
# -----------------------------------------------------------------------------
training:
  epochs: 200         # v1(100) 대비 2배 — mix 데이터 학습 수렴을 위해 증가
  trained_at: "2026-05-29"
  platform: Google Colab  # 런타임: T4 GPU

# -----------------------------------------------------------------------------
# 학습 결과
# -----------------------------------------------------------------------------
results:
  # mAP@0.5: IoU 0.5 기준 평균 정밀도 — 수락 기준 ≥ 0.85 ✅
  # v1(0.984)보다 소폭 낮은 이유: mix 데이터로 인해 더 어려운 조건에서 평가됨
  map50: 0.973
  # mAP@0.5:0.95: IoU 0.5~0.95 구간 평균 (엄격한 기준, v1 미측정)
  map50_95: 0.708

  # results/ 디렉토리: confusion matrix, PR curve 등 학습 결과 이미지·csv
  # gitignore 대상 — 코랩에서 다운로드 후 로컬에만 보관
  # ※ confusion matrix·PR curve PNG는 docs/images/top_view_v2/에도 git 추적됨
  results_dir: results/
  images: "docs/images/top_view_v2/ (git 추적)"

  # 클래스별 상세 성능
  # precision: 탐지한 것 중 실제 정답 비율 / recall: 실제 객체 중 탐지한 비율
  per_class:
    multi_tool:     { precision: 0.976, recall: 0.980, map50: 0.981, map50_95: 0.775 }
    ratchet_wrench: { precision: 0.977, recall: 0.929, map50: 0.947, map50_95: 0.738 }  # v1 대비 오인식 대폭 개선
    screwdriver:    { precision: 0.904, recall: 0.963, map50: 0.956, map50_95: 0.631 }
    socket_19mm:    { precision: 0.979, recall: 0.947, map50: 0.961, map50_95: 0.525 }
    spanner_16mm:   { precision: 0.998, recall: 1.000, map50: 0.995, map50_95: 0.787 }
    utility_knife:  { precision: 1.000, recall: 0.964, map50: 0.995, map50_95: 0.791 }

# Google Drive에 best.pt 업로드 후 공유 링크 기입
# 권한 설정: '링크 있는 모든 사용자 — 뷰어'
drive_url: ""  # TODO

# -----------------------------------------------------------------------------
# 클래스 인덱스 (v2 기준 — 알파벳순)
# ⚠️  v1과 순서가 다름. config/vision.yaml의 class_names와 반드시 일치해야 함
# -----------------------------------------------------------------------------
classes:
  0: multi_tool
  1: ratchet_wrench
  2: screwdriver
  3: socket_19mm
  4: spanner_16mm
  5: utility_knife

# -----------------------------------------------------------------------------
# 비고
# -----------------------------------------------------------------------------
notes:
  - "클래스 순서 v1(임의)에서 알파벳순으로 변경 — v1 best.pt와 혼용 절대 금지"
  - "mix 200장 추가 및 Roboflow 수동 검수로 ratchet_wrench 오인식 문제 개선"
  - "수락 기준 mAP@0.5 ≥ 0.85 통과 ✅"
