# =============================================================================
# top_view_model / v3-2 — 모델 정보
# =============================================================================
# 카메라: Intel RealSense D455f (탑뷰 고정 마운트)
# 역할: 공구함 전체를 위에서 내려다보며 어느 층·위치에 어떤 공구가 있는지 탐지
# 상태: 현재 운용 버전 (active: true)
#
# [v3 → v3-2 변경 요약]
#   - v3(195/200ep 미완료)를 동일 데이터셋으로 처음부터 재학습
#   - EarlyStopping 발동: epoch 145에서 best 기록 후 50ep 개선 없어 195ep에서 종료
#   - mAP@0.5: 0.946 → 0.952 소폭 향상
# =============================================================================

version: v3-2
description: "탑뷰 D455f 기준 공구 6종 탐지 모델 (현재 운용 버전)"

active: true

# -----------------------------------------------------------------------------
# 모델 파일
# -----------------------------------------------------------------------------
model:
  file: weights/best.pt
  base: yolo11s.pt
  image_size: 640

# -----------------------------------------------------------------------------
# 학습에 사용한 데이터셋
# -----------------------------------------------------------------------------
dataset:
  name: top_view_v3
  size: 1574  # augmentation 포함 / 원본 수집: v2(801장) + 보강 125장
  split: "train / valid / test (Roboflow 자동 분할)"
  source: "Roboflow — workspace: yeonseop9999-gmail-com / project: final-project-kir4p / version: 2"

# -----------------------------------------------------------------------------
# 학습 설정
# -----------------------------------------------------------------------------
training:
  epochs: 195         # EarlyStopping 발동 — best는 epoch 145
  best_epoch: 145
  trained_at: "2026-06-02"
  platform: Google Colab  # 런타임: T4 GPU

# -----------------------------------------------------------------------------
# 학습 결과
# -----------------------------------------------------------------------------
results:
  map50: 0.952
  map50_95: 0.768

  results_dir: results/
  images: "docs/images/top_view_v3-2/ (git 추적 예정)"

  per_class:
    multi_tool:     { precision: 1.000, recall: 0.976, map50: 0.994, map50_95: 0.798 }
    ratchet_wrench: { precision: 0.910, recall: 0.894, map50: 0.915, map50_95: 0.779 }
    screwdriver:    { precision: 0.966, recall: 0.885, map50: 0.958, map50_95: 0.731 }
    socket_19mm:    { precision: 0.931, recall: 0.918, map50: 0.905, map50_95: 0.617 }
    spanner_16mm:   { precision: 1.000, recall: 0.935, map50: 0.965, map50_95: 0.866 }
    utility_knife:  { precision: 1.000, recall: 0.863, map50: 0.974, map50_95: 0.815 }

drive_url: "https://drive.google.com/file/d/1Izf4GyKsa437_EuZExzhxfcCKBVv-jCo/view?usp=sharing"

# -----------------------------------------------------------------------------
# 클래스 인덱스 (v2와 동일 — 알파벳순)
# ⚠️  v1과 순서가 다름. config/vision.yaml의 class_names와 반드시 일치해야 함
# -----------------------------------------------------------------------------
classes:
  0: multi_tool
  1: ratchet_wrench
  2: screwdriver
  3: socket_19mm
  4: spanner_16mm
  5: utility_knife

# -----------------------------------------------------------------------------
# 비고
# -----------------------------------------------------------------------------
notes:
  - "v3 재학습 버전 — 동일 데이터셋, EarlyStopping epoch 145에서 best 달성"
  - "v3(mAP50=0.946) 대비 소폭 향상 (0.952)"
  - "socket_19mm mAP50=0.905 — 수락 기준 통과했으나 추가 수집 검토 여지 있음"
  - "클래스 순서 v2와 동일 (알파벳순) — v1 best.pt와 혼용 절대 금지"
