# =============================================================================
# top_view_model / v3 — 모델 정보
# =============================================================================
# 카메라: Intel RealSense D455f (탑뷰 고정 마운트)
# 역할: 공구함 전체를 위에서 내려다보며 어느 층·위치에 어떤 공구가 있는지 탐지
# 상태: 백업 버전 (active: false) — v3-2로 교체 완료 (2026-06-02)
#
# [v2 → v3 변경 요약]
#   - 데이터셋: 801장 → 1574장 (augmentation 포함)
#     수집 보강: multi_tool 오탐/미탐 + ratchet_wrench·screwdriver 혼합 상황 125장 추가
#     Augmentation 추가: Flip(H), 90°Rotate, Rotation±15°, Brightness±25%, Blur 1px
#   - 학습: 195/200 epoch (런타임 중단으로 미완료) — best.pt는 정상 저장됨
#   - ArUco 마커 3장 포함: 천장(ROI 정의) + 서랍 손잡이 2개(층 식별)
# =============================================================================

version: v3
description: "탑뷰 D455f 기준 공구 6종 탐지 모델 (v3 백업 — v3-2 완료 후 교체 예정)"

active: false

# -----------------------------------------------------------------------------
# 모델 파일
# -----------------------------------------------------------------------------
model:
  file: weights/best.pt
  base: yolo11s.pt
  image_size: 640

# -----------------------------------------------------------------------------
# 학습에 사용한 데이터셋
# -----------------------------------------------------------------------------
dataset:
  name: top_view_v3
  size: 1574  # augmentation 포함 / 원본 수집: v2(801장) + 보강 125장
  split: "train / valid / test (Roboflow 자동 분할)"
  source: "Roboflow — workspace: yeonseop9999-gmail-com / project: final-project-kir4p / version: 2"

# -----------------------------------------------------------------------------
# 학습 설정
# -----------------------------------------------------------------------------
training:
  epochs: 195         # 200 목표 중 런타임 중단으로 195에서 종료
  trained_at: "2026-06-01"
  platform: Google Colab  # 런타임: T4 GPU

# -----------------------------------------------------------------------------
# 학습 결과
# -----------------------------------------------------------------------------
results:
  map50: 0.946
  map50_95: 0.764

  results_dir: results/
  images: "docs/images/top_view_v3/ (git 추적 예정)"

  per_class: {}  # TODO: v3-2 완료 후 갱신

drive_url: "https://colab.research.google.com/drive/1axbv7vYvHfU-frv4DvkFtjYGddmncNhE?usp=sharing"

# -----------------------------------------------------------------------------
# 클래스 인덱스 (v2와 동일 — 알파벳순)
# ⚠️  v1과 순서가 다름. config/vision.yaml의 class_names와 반드시 일치해야 함
# -----------------------------------------------------------------------------
classes:
  0: multi_tool
  1: ratchet_wrench
  2: screwdriver
  3: socket_19mm
  4: spanner_16mm
  5: utility_knife

# -----------------------------------------------------------------------------
# 비고
# -----------------------------------------------------------------------------
notes:
  - "195/200 epoch 완료 — 런타임 중단으로 미완료. best.pt는 정상 저장됨"
  - "v3-2 (동일 데이터셋, 처음부터 재학습 중)로 교체 예정"
  - "클래스 순서 v2와 동일 (알파벳순) — v1 best.pt와 혼용 절대 금지"
