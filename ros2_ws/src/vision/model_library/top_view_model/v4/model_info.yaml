# =============================================================================
# top_view_model / v4 — 모델 정보
# =============================================================================
# 카메라: Intel RealSense D455f (탑뷰 고정 마운트)
# 역할: 공구함 전체를 위에서 내려다보며 공구 6종의 위치 탐지
# 상태: active (2026-06-24 운용 전환)
#
# [v3-seg → v4 변경 요약]
#   - Isaac Sim 랜덤 합성 이미지 4,000장 + 실사 이미지 혼합 학습
#   - 합성 데이터로 다양한 조명·배경·자세 커버리지 강화
# =============================================================================

version: v4
description: "탑뷰 D455f 기준 공구 6종 탐지 모델 — Isaac Sim 합성 4,000장 + 실사 혼합"

active: true

# -----------------------------------------------------------------------------
# 모델 파일
# -----------------------------------------------------------------------------
model:
  file: weights/best.pt
  image_size: 640

# -----------------------------------------------------------------------------
# 학습에 사용한 데이터셋
# -----------------------------------------------------------------------------
dataset:
  synthetic_images: 4000    # Isaac Sim 랜덤 합성 이미지
  notes: "실사 이미지 + Isaac Sim 합성 이미지 4,000장 혼합 학습"

# -----------------------------------------------------------------------------
# 클래스 인덱스
# ⚠️  config/vision.yaml 의 class_names 와 반드시 일치해야 함
# -----------------------------------------------------------------------------
classes:
  0: multi_tool
  1: ratchet_wrench
  2: screwdriver
  3: socket_19mm
  4: spanner_16mm
  5: utility_knife

# -----------------------------------------------------------------------------
# 비고
# -----------------------------------------------------------------------------
notes:
  - "Isaac Sim 합성 데이터 4,000장 추가로 조명·배경 다양성 확보"
  - "active: true 전환 시 config/vision.yaml의 top_view_model_path 동시 갱신 필수"
